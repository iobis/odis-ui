services:
  api:
    build: ./api
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  nginx:
    build:
      context: ./web
      target: prod
      args:
        VITE_API_URL: /api/v1
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.http.conf:/etc/nginx/conf.d/http.conf:ro
      - ./nginx/nginx.prod.https.conf:/etc/nginx/conf.d/https.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api
    restart: unless-stopped
